<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} · Paimon</title>
  <!-- 主题早期应用：在 head 第一时间把 data-theme 写到 <html>，避免 FOWT（白屏闪一下深色） -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('paimon-theme');
        var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.dataset.theme = saved || sys;
      } catch (e) {
        document.documentElement.dataset.theme = 'light';
      }
    })();
  </script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230EA5E9'%3E%3Ccircle cx='12' cy='12' r='10'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/warm.css">
  {{extra_css|safe}}
</head>
<body class="dash-warm {{body_class|safe}}">
  <div class="dash-app">
    {{include:_warm_sidebar}}
    <main class="dash-main">
      <div class="dash-content">
        {{content|safe}}
      </div>
    </main>
  </div>
  <script src="/static/js/icons.js"></script>
  <script src="/static/js/components.js"></script>
  {{extra_js|safe}}
</body>
</html>
