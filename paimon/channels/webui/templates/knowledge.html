<div class="dash-page-header">
  <div>
    <h1 class="dash-page-title"><span data-icon="database"></span>世界树</h1>
    <p class="dash-page-subtitle">跨会话记忆 + 结构化知识库</p>
  </div>
  <div>
    <button id="kn-refresh" class="pm-btn pm-btn--default">
      <span class="pm-btn__icon" data-icon="refresh-cw"></span>
      <span class="pm-btn__label">刷新</span>
    </button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('memory',this)">
    记忆<span class="tab-count" id="countMem"></span>
  </button>
  <button class="tab-btn" onclick="switchTab('kb',this)">
    知识库<span class="tab-count" id="countKb"></span>
  </button>
</div>

<div id="memory" class="tab-panel active">
  <div class="pills-row">
    <div class="pills" role="tablist" aria-label="记忆类型">
      <div class="pill active" role="tab" tabindex="0" aria-selected="true" data-mem="user" onclick="switchMemType('user',this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();switchMemType('user',this)}">画像与偏好</div>
      <div class="pill" role="tab" tabindex="0" aria-selected="false" data-mem="feedback" onclick="switchMemType('feedback',this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();switchMemType('feedback',this)}">行为规范</div>
      <div class="pill" role="tab" tabindex="0" aria-selected="false" data-mem="project" onclick="switchMemType('project',this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();switchMemType('project',this)}">项目事实</div>
      <div class="pill" role="tab" tabindex="0" aria-selected="false" data-mem="reference" onclick="switchMemType('reference',this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();switchMemType('reference',this)}">外部资源</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-add" onclick="triggerHygiene()" id="btnHygiene" title="LLM 扫全部记忆，批量合并/去重。周一凌晨自动跑。">🧹 整理</button>
      <button class="btn-add" onclick="openMemCreate()">+ 新建</button>
    </div>
  </div>
  <div id="memEl"><div class="empty-state">加载中…</div></div>
</div>

<div id="kb" class="tab-panel">
  <div class="pills-row">
    <div class="pills"></div>
    <div style="display:flex;gap:8px">
      <button class="btn-add" onclick="triggerKbHygiene()" id="btnKbHygiene" title="LLM 按分类扫知识库，批量合并/去重。周一凌晨自动跑。">🧹 整理</button>
      <button class="btn-add" onclick="openKbCreate()">+ 新建</button>
    </div>
  </div>
  <div id="kbEl"><div class="empty-state">加载中…</div></div>
</div>

<div id="modal" class="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modalTitle">详情</h3>
      <div class="modal-actions">
        <button id="modalEditBtn" class="btn-view" style="display:none" onclick="modalStartEdit()">编辑</button>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-meta" id="modalMeta"></div>
  </div>
</div>

<div id="flashBar" class="flash-bar"></div>

<div id="formModal" class="modal-backdrop" onclick="closeFormModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="formTitle">新建</h3>
      <button class="modal-close" onclick="closeFormModal()">×</button>
    </div>
    <div id="formBody" class="form-body"></div>
    <div class="form-actions">
      <button class="btn-revoke" onclick="closeFormModal()">取消</button>
      <button class="btn-save" onclick="submitForm()">保存</button>
    </div>
    <div id="formError" class="form-error"></div>
  </div>
</div>
