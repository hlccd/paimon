<div class="dash-page-header">
  <div>
    <h1 class="dash-page-title"><span data-icon="list-checks"></span>任务</h1>
    <p class="dash-page-subtitle">用户定时任务 + 系统周期任务</p>
  </div>
  <div class="pm-row" style="gap: var(--pm-space-3)">
    <span class="dash-page-hint" title="每 30 秒自动刷新当前 Tab">每 30 秒自动刷新</span>
    <button id="tasks-refresh" class="pm-btn pm-btn--default" type="button">
      <span class="pm-btn__icon" data-icon="refresh-cw"></span>
      <span class="pm-btn__label">刷新</span>
    </button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('scheduled',this)">
    定时任务<span class="tab-count" id="countScheduled"></span>
  </button>
  <button class="tab-btn" onclick="switchTab('system',this)">
    系统任务<span class="tab-count" id="countSystem"></span>
  </button>
</div>

<div id="scheduled" class="tab-panel active">
  <div id="taskGrid">
    <div class="empty-state">加载中…</div>
  </div>
</div>

<div id="system" class="tab-panel">
  <div id="systemGrid">
    <div class="empty-state">加载中…</div>
  </div>
</div>
